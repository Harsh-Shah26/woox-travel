{% extends "base.html" %}
{% block content %}
<br><br><br>
<h3 class="text-center text-dark mt-3">Dynamic paginator</h3>
<div class="container">
    <div class="row">
        {% for i in paginator_data %}
        <div class="col-lg-4 mt-4">
            <div class="box text-light bg-dark p-3 paginator">
                <h3 class="text-white">{{i.paginator_title | safe | capfirst}}</h3>
                <p>{{i.paginator_des | safe | capfirst}}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<br>
{% endblock content %}
