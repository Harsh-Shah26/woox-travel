<script>
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: '{{ message.tags }}',
                title: '{{ message.tags|title }}',
                text: '{{ message }}',
            });
        {% endfor %}
    {% else %}
        alertify.set('notifier', 'position', 'top-center');
        {% for msg in messages %}
            alertify.success('{{ msg }}');
        {% endfor %}
    {% endif %}
</script>

<script>
    $(".option").click(function () {
        $(".option").removeClass("active");
        $(this).addClass("active");
